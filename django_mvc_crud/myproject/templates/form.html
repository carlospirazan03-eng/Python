<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Arena Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">
                        {% if product %} Editar Producto: {{ product.name }} {% else %} Nuevo Producto {% endif %}
                    </h4>
                </div>
                <div class="card-body">
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nombre del Producto</label>
<input type="text" name="nombre" value="{{ product.nombre|default:'' }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" step="0.01" name="precio" class="form-control" 
                                   value="{{ product.precio|default:'' }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Imagen (Opcional)</label>
                            <input type="file" name="imagen" class="form-control">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                {% if product %} Guardar Cambios {% else %} Crear Producto {% endif %}
                            </button>
                            <a href="/" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
